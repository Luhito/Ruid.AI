name: CI

on:
  push:
    branches:
      - main
  # pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install frontend
        working-directory: ./frontend
        run: npm ci

      - name: Frontend lint
        working-directory: ./frontend
        run: npm run lint

      - name: Frontend build
        working-directory: ./frontend
        run: npm run build
