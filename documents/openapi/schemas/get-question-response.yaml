type: object

required:
  - correct_answer_index
  - choiceTags
  - choiceTexts
  - question_test
  - explanation_test

properties:
  correct_answer_index:
    description: 選択肢の中で、正解のインデックス
    type: integer
    example: 1

  choiceTags:
    description: 選択肢の記号
    type: array
    example: ['A', 'B', 'C', 'D']

  choiceTexts:
    description: 選択肢の内容
    type: array
    example: ['choice1', 'choice2', 'choice3', 'choice4']

  question_test:
    description: 問題文
    type: string
    example: "テスト用問題文\n\n改行もあるよ\n\n**how's the bold letter?**"

  explanation_test: 
    description: 解説文
    type: string
    example: "ここに説明が表示されるはずです\n\n**それも、マークダウンで！**"