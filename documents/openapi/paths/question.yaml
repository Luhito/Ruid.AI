get:
  tags:
    - Question

  description: 作成済みの問題を取得
  operationId: getQuestion

  parameters:
    - $ref: '../openapi.yaml#/components/parameters/Qid'
      
  responses:
    '200':
      description: 取得成功

      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/responses/GetQuestionResponse'

    '400':
      description: バリデーションエラー
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/responses/ErrorResponse'

    '401':
      description: 認証エラー

    '404':
      description: 問題が存在しない
            
    '500':
      description: Internal server error