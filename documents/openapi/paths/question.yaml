get:
  tags:
    - Question

  summary: 問題取得
  operationId: getQuestion

  parameters:
    - in: query
      name: qid
      schema:
        type: string
        format: UUID
      required: true
      description: 問題ID(UUID)

    - in: header
      name: User-Agent
      schema:
        type: string
      required: true
      description: クライアントのブラウザとOS情報

    - in: header
      name: Accept-Language 
      schema:
        type: string
      description: 受け入れ可能な自然言語
      
  responses:
    '200':
      description: 取得成功

      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/GetQuestionResponse'

    '400':
      description: バリデーションエラー

    '409':
      description: ユーザー重複