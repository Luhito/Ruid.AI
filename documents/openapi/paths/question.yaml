get:
  tags:
    - Question

  description: 問題取得
  operationId: getQuestion

  parameters:
    - in: query
      name: qid
      schema:
        type: string
        format: UUID
      required: true
      description: 問題ID(UUID)
      
  responses:
    '200':
      description: 取得成功

      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/GetQuestionResponse'

    '400':
      description: バリデーションエラー
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/ErrorResponse'

    '401':
      description: 認証エラー
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/ErrorResponse'

    '404':
      description: 問題が存在しない
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
            
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/ErrorResponse'